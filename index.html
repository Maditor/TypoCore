<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TypoCore v3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    font-size: 11px;
    background: #2b2b2b;
    color: #ccc;
    padding: 8px;
    user-select: none;
    overflow-y: auto;
  }
  .panel { display: flex; flex-direction: column; gap: 6px; min-height: 100%;  overflow: visible; }

  .section {
    border: 1px solid #444;
    border-radius: 3px;
    padding: 6px;
  }
  .section-title {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  button {
    background: #3c3c3c;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-family: Arial, sans-serif;
    transition: background 0.1s;
  }
  button:hover  { background: #4a4a4a; }
  button:active { background: #222; }
  button:disabled { opacity: 0.4; cursor: default; }

  .case-grid { display: flex; flex-direction: column; gap: 4px; }
  .case-row  { display: flex; gap: 4px; }
  .case-row button { flex: 1; height: 26px; }

  .split-row { display: flex; gap: 4px; }
  .split-row button { flex: 1; height: 26px; }

  .size-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .size-row button { height: 26px; }
  .btn-apply { width: 48px; }
  .btn-arrow { width: 26px; }
  #sizeDisplay {
    width: 30px;
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    color: #eee;
    background: #222;
    border: 1px solid #555;
    border-radius: 3px;
    height: 26px;
    line-height: 26px;
    padding: 0;
    outline: none;
}
#sizeDisplay:focus {
    border-color: #888;
}

  .action-grid { display: flex; flex-direction: column; gap: 4px; }
  .action-row  { display: flex; gap: 4px; }
  .action-row button { flex: 1; height: 36px; font-size: 11px; }

  button.flash-ok   { background: #2a5a2a !important; color: #7f7 !important; }
  button.flash-err  { background: #5a2a2a !important; color: #f77 !important; }

  /* Footer chứa nút Setting */
    .panel-footer {
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px solid #444;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Dropdown container */
  .setting-wrapper {
    position: relative;
    display: inline-block;
  }

  .setting-btn {
    background: none;
    border: none;
    color: #aaa;
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    padding: 2px 0;
    font-family: Arial, sans-serif;
  }
  .setting-btn:hover {
    color: #fff;
  }

  /* Popup menu (ẩn mặc định, nổi từ dưới lên) */
  .setting-popup {
    display: none;
    position: absolute;
    bottom: 100%;            /* nằm phía trên nút */
    right: 0;
    margin-bottom: 4px;
    background: #383838;
    border: 1px solid #555;
    border-radius: 4px;
    z-index: 2000;
    min-width: 180px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    padding: 4px 0;
    max-height: 350px;     
    overflow-y: auto;
  }
  .setting-popup.show {
    display: block;
  }

  .setting-item {
    display: flex;
    align-items: center;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 11px;
    color: #ddd;
    white-space: nowrap;
  }
  .setting-item:hover {
    background: #4a4a4a;
  }
  .setting-item input[type="checkbox"] {
    margin-right: 8px;
  }
  .setting-separator {
    border-top: 1px solid #555;
    margin: 4px 0;
  }

  /* --- Preview Popup Overlay --- */
  #previewOverlay {
    display: none;
    position: relative;
    z-index: 1000;
    margin-top: 4px;
    pointer-events: none;
}
  #previewPopup {
    width: 100%;
    max-width: 100%;        
    max-height: 320px;
    background: #2b2b2b;
    border: 1px solid #555;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    pointer-events: auto;
    box-shadow: 0 8px 16px rgba(0,0,0,0.6);
}
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: #3a3a3a;
    border-bottom: 1px solid #555;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .preview-header button {
    background: #4a4a4a;
    border: 1px solid #666;
    color: #ddd;
    padding: 4px 12px;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
  }
  .preview-header button:hover {
    background: #5a5a5a;
  }
  .preview-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }
  .preview-item {
    background: #383838;
    border: 1px solid #4a4a4a;
    border-radius: 4px;
    padding: 5px;
    text-align: center;
    font-size: 9px;
    color: #ddd;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: pre-wrap;
    word-wrap: break-word;     
    width: max-content;     
    min-width: 100%;         
}
  .preview-item:hover {
    background: #4a4a4a;
    border-color: #888;
  }
  .preview-item .case-label {
    font-weight: bold;
    color: #aaa;
    margin-bottom: 4px;
    display: block;
  }
  #btnPreviewLayout {
    height: 36px;
    width: 100%;
  }

  /* Chế độ ngang */
  .preview-grid.horizontal {
    flex-direction: row;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .preview-grid.horizontal .preview-item {
    flex: 0 0 auto;
    min-width: 150px;      /* có thể giữ hoặc bỏ */
    width: max-content;    /* tự động mở rộng theo nội dung */
    white-space: nowrap;   /* không ngắt dòng */
}


   /* Tùy chỉnh thanh trượt cho popup setting */
.setting-popup::-webkit-scrollbar {
    width: 7px;
    background: #1a1a1a;
}
.setting-popup::-webkit-scrollbar-track {
    background: #2b2b2b;
}
.setting-popup::-webkit-scrollbar-thumb {
    background: #777;
    border-radius: 2px;
}
.setting-popup::-webkit-scrollbar-thumb:hover {
    background: #555;
}

  .footer-credit {
    font-size: 9px;
    color: #555;
    user-select: none;
    pointer-events: none;
  }

/* Tùy chỉnh thanh cuộn cho vùng preview */
.preview-grid::-webkit-scrollbar {
    width: 7px;                /* độ rộng thanh dọc */
    height: 7px;               /* độ cao thanh ngang */
    background: #1a1a1a;       /* màu nền thanh cuộn (đen) */
}

.preview-grid::-webkit-scrollbar-track {
    background: #2b2b2b;       /* màu rãnh trượt */
}

.preview-grid::-webkit-scrollbar-thumb {
    background: #777;          /* màu con lăn (xám đậm) */
    border-radius: 2px;
}

.preview-grid::-webkit-scrollbar-thumb:hover {
    background: #555;          /* màu khi rê chuột lên */
}
</style>
</head>

  // Dữ liệu pattern từ host.jsx (dùng cho preview)
  var _patternData = {

    3:{4:[1,2,1],6:[1,2,3],7:[1,2,3,1],8:[1,2,3,2],10:[1,2,4,3],11:[1,2,3,3,2],13:[2,4,4,3],14:[2,5,4,3],15:[2,4,5,4],17:[2,4,5,4,2],20:[2,4,6,4,4],24:[2,4,6,5,4,3],30:[2,5,7,6,6,4]},
    4:{4:[2,2],6:[2,4],7:[2,2,3],8:[2,3,3],10:[2,4,4],11:[2,4,5],13:[3,6,4],14:[3,7,4],15:[2,5,6,2],17:[2,5,6,4],20:[3,7,6,4],24:[3,7,6,5,3],30:[3,7,7,7,6]},
    5:{4:[1,2,1],6:[3,2,1],7:[1,2,2,2],8:[2,3,2,1],10:[1,4,3,2],11:[2,3,4,2],13:[3,4,4,2],14:[3,4,4,2,1],15:[2,3,4,4,2],17:[3,4,4,4,2],20:[3,5,5,5,2],24:[3,4,5,5,5,2],30:[4,5,6,6,6,3]},
    6:{4:[2,2],6:[4,2],7:[2,2,2,1],8:[3,3,2],10:[4,4,2],11:[4,5,2],13:[4,6,3],14:[5,6,3],15:[5,6,4],17:[4,6,4,3],20:[5,6,6,3],24:[6,7,7,4],30:[6,7,7,7,3]},
    7:{4:[2,2],6:[2,2,2],7:[3,4],8:[2,4,2],10:[2,3,3,2],11:[2,3,3,3],12:[2,4,3,3],13:[3,3,4,3],14:[2,4,5,3],15:[2,5,4,4],16:[2,3,4,4,3],17:[2,4,5,4,2],20:[2,5,5,5,3],23:[3,4,6,4,4,2],24:[2,3,5,6,5,3],30:[2,6,7,6,6,3]},
    8:{4:[2,2],6:[3,2,2],7:[3,3,1],8:[3,3,2],10:[3,3,2,2],11:[3,5,3],12:[2,4,4,2],13:[3,5,3,2],14:[3,5,4,2],15:[3,5,5,2],17:[3,3,5,4,2],20:[3,5,6,4,2],21:[3,5,5,5,3],24:[3,5,6,5,3,2],30:[3,6,8,7,4,2]},

  // Hàm tạo preview text cho case n (1-9)
  function getCasePreview(text, n) {
      var words = text.replace(/[\r\n]+/g, " ").replace(/\s+/g, " ").trim().split(" ");
      var total = words.length;
      var map = _patternData[n];
      if (!map) return text;
      var closestKey = null, minDiff = 9999;
      for (var k in map) {
          var diff = Math.abs(total - parseInt(k));
          if (diff < minDiff) { minDiff = diff; closestKey = k; }
      }
      var pattern = map[closestKey].slice();
      var sum = pattern.reduce(function(a,b){return a+b;},0);
      if (total > sum) {
          var extra = total - sum;
          var len = pattern.length;
          if (len % 2 == 1) {
              pattern[Math.floor(len/2)] += extra;
          } else {
              var m1 = Math.floor(len/2)-1, m2 = Math.floor(len/2);
              pattern[m1] += Math.floor(extra/2);
              pattern[m2] += extra - Math.floor(extra/2);
          }
      }
      var lines = [], idx = 0;
      for (var i = 0; i < pattern.length; i++) {
          var lineWords = [];
          for (var j = 0; j < pattern[i]; j++) {
              if (words[idx]) lineWords.push(words[idx++]);
          }
          lines.push(lineWords.join(" "));
      }
      return lines.join("\n");
  }

// Load host.jsx

// Kiểm tra tác vụ không được phép xếp hàng (Layout Cases, Split Even)
function _isNoQueueTask(expr) {
    return expr.startsWith('applyCase') || expr.startsWith('splitEven');
}

// Hàm thực thi thực sự (không qua queue)
function _executeNow(expr, btn, onDone) {
    if (_busy) return;
    _busy = true;
    _currentExpr = expr;               // ghi nhớ lệnh đang chạy
    cs.evalScript(expr, function(result) {
        _busy = false;
        _currentExpr = '';
        console.log("[Exec]", expr, "=>", result);
        if (btn) flash(btn, result);
        if (onDone) onDone(result);
        // Xử lý tác vụ kế tiếp trong hàng chờ
        _processQueue();
    });
}

// Xử lý hàng chờ
function _processQueue() {
    if (_busy) return;
    if (_queue.length === 0) return;
    var task = _queue.shift();
    _executeNow(task.expr, task.btn, task.onDone);
}

// Giao diện chính: _exec
function _exec(expr, btn, onDone) {
    if (!_busy) {
        // Không bận -> thực hiện ngay
        _executeNow(expr, btn, onDone);
        return;
    }

    // Đang bận
    // 1. Tác vụ không xếp hàng -> bỏ qua
    if (_isNoQueueTask(expr)) {
        console.log("[Queue] Bỏ qua (no-queue):", expr);
        return;
    }

    // 2. Hàng chờ đầy -> bỏ qua
    if (_queue.length >= MAX_QUEUE) {
        console.log("[Queue] Đầy, bỏ qua:", expr);
        return;
    }

    // 3. Trùng với tác vụ đang thực hiện hoặc đã có trong hàng chờ
    if (_currentExpr === expr) {
        console.log("[Queue] Trùng với tác vụ đang chạy:", expr);
        return;
    }
    for (var i = 0; i < _queue.length; i++) {
        if (_queue[i].expr === expr) {
            console.log("[Queue] Trùng lặp, bỏ qua:", expr);
            return;
        }
    }

    // Được phép xếp hàng
    _queue.push({ expr: expr, btn: btn, onDone: onDone });
    console.log("[Queue] Thêm vào:", expr, "- Số lượng:", _queue.length);
}

function runBtn(expr, el) { _exec(expr, el); }

var BAD = {
  "ERROR":1, "NO_LAYER":1, "NO_FX":1,
  "NO_PATH":1, "NO_FILE":1, "NO_DOC":1, "NO_TEXT":1, "NO_OTHER_DOC":1
};
function flash(btn, result) {
  if (!btn) return;
  var bad = !result || BAD[result] || (result+"").includes("ERROR");
  btn.classList.add(bad ? "flash-err" : "flash-ok");
  setTimeout(() => btn.classList.remove(bad ? "flash-err" : "flash-ok"), 500);
}

  var _step = 3;
var sizeInput = document.getElementById("sizeDisplay");
var isEditing = false;

function updateStepUI() {
    if (!isEditing) {
        sizeInput.value = _step;
    }
}

function applyStepInput() {
    if (!isEditing) return;
    var val = parseInt(sizeInput.value, 10);
    if (isNaN(val)) val = _step;          // nhập chữ -> giữ nguyên
    val = Math.max(1, Math.min(999, val)); // giới hạn 1-50
    _step = val;
    sizeInput.value = _step;
    sizeInput.readOnly = true;            // khóa lại
    sizeInput.style.backgroundColor = "#222";
    isEditing = false;
}

// Mở khóa khi double-click
sizeInput.addEventListener("click", function(e) {
    if (isEditing) return;                // đã mở rồi thì thôi
    isEditing = true;
    sizeInput.readOnly = false;
    sizeInput.focus();
    sizeInput.select();
    sizeInput.style.backgroundColor = "#2a2a2a";
});

// Xác nhận khi ấn Enter
sizeInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        applyStepInput();
        sizeInput.blur();
    }
});

// Xác nhận khi rời khỏi input (focusout)
sizeInput.addEventListener("focusout", function(e) {
    // Dùng setTimeout 0 để đảm bảo focus đã chuyển đi xong
    setTimeout(function() {
        if (isEditing && document.activeElement !== sizeInput) {
            applyStepInput();
        }
    }, 10);
});

// Hàm thay đổi bước nhảy (nút ▲/▼) – không hoạt động nếu đang nhập
function changeStep(delta) {
    if (isEditing) return;
    _step = Math.min(50, Math.max(1, _step + delta));
    updateStepUI();
}

// Hàm áp dụng cỡ chữ (nút −/+)
function applySize(sign) {
    if (isEditing) return;
    var d = _step * sign;
    var btn = document.getElementById(sign > 0 ? "btnPlus" : "btnMinus");
    _exec('applyNow(' + d + ',' + d + ')', btn);
}

// Đồng bộ giao diện ban đầu
updateStepUI();

  function doCopyFX() {
    var btn = document.getElementById("btnCopyFX");
    _exec('copyFX()', btn, function(res) {
      if (res === "OK") document.getElementById("btnPasteFX").disabled = false;
    });
  }

  function doPasteFX() {
    var btn = document.getElementById("btnPasteFX");
    _exec('pasteFX()', btn, function(res) {
        if (res === "OK") {
            var vis = loadVis();
            if (!vis.multiplePaste) {
                btn.disabled = true;
            }
        }
    });
  }

  // ========== TOOL VISIBILITY ==========
  var STORAGE_KEY = "typoCoreToolVisibility";
  var TOOL_DEFS = {
    layoutCases: { sectionId: "section-layout", isSection: true },
    splitEven:   { sectionId: "section-split",   isSection: true },
    fontSize:    { sectionId: "section-size",    isSection: true },
    resizeBox:   { dataTool: "resizeBox", isSection: false },
    center:      { dataTool: "center",    isSection: false },
    groupText:   { dataTool: "groupText", isSection: false },
    checkBG:     { dataTool: "checkBG",   isSection: false },
    copyFX:      { dataTool: "copyFX",    isSection: false },
    pasteFX:     { dataTool: "pasteFX",   isSection: false },
    selectForm:  { dataTool: "selectForm", isSection: false },
    logo:        { dataTool: "logo",       isSection: false },
    multiplePaste: { dataTool: "nonexistent", isSection: false },
    manualLoadText: { dataTool: "nonexistent2", isSection: false }
  };

  function loadVis() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        if (typeof data.multiplePaste === "undefined") data.multiplePaste = false;
        return data;
      }
    } catch(e) {}
    var vis = {};
    for (var k in TOOL_DEFS) vis[k] = true;
    vis.multiplePaste = false;
    return vis;
  }

  function saveVis(vis) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(vis)); } catch(e) {}
  }

  function applyVis(vis) {
    for (var key in TOOL_DEFS) {
      var def = TOOL_DEFS[key];
      var show = vis[key] !== false;
      if (def.isSection) {
        var el = document.getElementById(def.sectionId);
        if (el) el.style.display = show ? "" : "none";
      } else {
        var btn = document.querySelector('[data-tool="' + def.dataTool + '"]');
        if (btn) btn.style.display = show ? "" : "none";
      }
    }
    var rows = document.querySelectorAll(".action-row");
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var btns = row.querySelectorAll("button");
      var any = false;
      for (var j = 0; j < btns.length; j++) {
        if (btns[j].style.display !== "none") { any = true; break; }
      }
      row.style.display = any ? "" : "none";
    }
    requestAnimationFrame(function() {
      cs.resizeContent(document.body.scrollWidth, document.body.scrollHeight);
    });
    updateCheckboxes(vis);
  }

  function updateCheckboxes(vis) {
    for (var key in TOOL_DEFS) {
      var cb = document.getElementById("toggle_" + key);
      if (cb) cb.checked = vis[key] !== false;
    }
  }

  // ========== SETTING POPUP LOGIC ==========
  function setupSettingPopup() {
    var btn = document.getElementById("settingBtn");
    var popup = document.getElementById("settingPopup");

    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      popup.classList.toggle("show");
    });

    // Đóng popup khi click ra ngoài
    document.addEventListener("click", function(e) {
      if (!popup.contains(e.target) && e.target !== btn) {
        popup.classList.remove("show");
      }
    });

    // Xử lý các mục hành động
    popup.querySelectorAll("[data-action]").forEach(function(item) {
      item.addEventListener("click", function(e) {
        var action = this.getAttribute("data-action");
        if (action === "chooseLogo") {
          cs.evalScript('pickLogoPath()', function(result) {
            if (!result || result === "CANCELLED") return;
            if (result.indexOf("ERROR") !== -1) return;
            localStorage.setItem("typoCoreLogoPath", result);
            cs.evalScript('LOGO_PATH = "' + result.replace(/"/g, '\\"') + '"');
            var fname = result.split("/").pop();
            var btnLogo = document.getElementById("btnLogo");
            if (btnLogo) {
              btnLogo.title = result;
              btnLogo.classList.add("flash-ok");
              setTimeout(() => btnLogo.classList.remove("flash-ok"), 800);
            }
            console.log("[Logo] Đã lưu:", result);
          });
        } else if (action === "pasteAllOpened") {
          _exec("pasteLogoToAllDocs()", null, function(res) {
            console.log("[PasteLogo]", res);
            if (res !== "OK") alert("Lỗi: " + res);
          });
        }
        popup.classList.remove("show"); // đóng popup sau khi chọn
      });
    });

    // Xử lý checkbox toggle (không đóng popup)
    popup.querySelectorAll("input[type='checkbox']").forEach(function(cb) {
    cb.addEventListener("click", function(e) {
        e.stopPropagation();
        var key = this.id.replace("toggle_", "");
        if (TOOL_DEFS.hasOwnProperty(key)) {
            var vis = loadVis();
            vis[key] = this.checked;
            saveVis(vis);
            applyVis(vis);

            // Nếu là manualLoadText, điều chỉnh polling ngay lập tức
            if (key === "manualLoadText") {
                var overlay = document.getElementById("previewOverlay");
                if (overlay && overlay.style.display === "block") {
                    if (vis.manualLoadText) {
                        // Đang bật manual -> tắt polling
                        if (previewInterval) {
                            clearInterval(previewInterval);
                            previewInterval = null;
                        }
                    } else {
                        // Tắt manual -> bật polling nếu chưa có
                        if (!previewInterval) {
                            previewInterval = setInterval(window.updatePreviewIfNeeded, 1000);
                        }
                    }
                }
            }
        }
    });
});


    // Toggle Hide/Unhide Tool submenu
    var toolToggle = document.getElementById("toolManagerToggle");
    var toolSub = document.getElementById("toolManagerSub");
    var toolArrow = document.getElementById("toolManagerArrow");
    toolToggle.addEventListener("click", function(e) {
        e.stopPropagation();
        if (toolSub.style.display === "none") {
            toolSub.style.display = "block";
            toolArrow.textContent = "▲";
        } else {
            toolSub.style.display = "none";
            toolArrow.textContent = "▼";
        }
    });

    // Khởi tạo checkbox từ localStorage
    updateCheckboxes(loadVis());
  }

  // ========== PREVIEW POPUP LOGIC ==========
 function setupPreviewPopup() {
    var overlay = document.getElementById("previewOverlay");
    var btnOpen = document.getElementById("btnPreviewLayout");
    var btnLoad = document.getElementById("btnPreviewLoad");
    var btnClose = document.getElementById("btnPreviewClose");
    var btnToggle = document.getElementById("btnPreviewToggle");
    btnToggle.textContent = "H";
    var grid = document.getElementById("previewGrid");
    var lastPreviewText = "";
    var isHorizontal = false;

    // Hàm tự động update nếu text thay đổi (gọi mỗi 200ms)
    function updatePreviewIfNeeded() {
        cs.evalScript('getText()', function(text) {
            if (!text || text.indexOf("ERROR") >= 0) return;
            if (text === lastPreviewText) return;
            lastPreviewText = text;
            if (!text.trim()) {
                grid.innerHTML = "";
                return;
            }
            renderPreviews(text);
        });
    }

window.updatePreviewIfNeeded = updatePreviewIfNeeded;

    // Hàm vẽ preview (dùng cho cả load và auto-update)
    function renderPreviews(text) {
        grid.innerHTML = "";
        for (var n = 1; n <= 9; n++) {
            var formatted = getCasePreview(text, n);
            var item = document.createElement("div");
            item.className = "preview-item";
            item.innerHTML = formatted.replace(/\n/g, "<br>");
            item.addEventListener("click", function(caseNum) {
                return function() {
                    _exec('applyCase(' + caseNum + ')');
                };
            }(n));
            grid.appendChild(item);
        }
    }

    // Load thủ công
    function loadPreviews() {
        cs.evalScript('getText()', function(text) {
            if (!text || text.indexOf("ERROR") >= 0) {
                alert("Không tìm thấy text layer!");
                return;
            }
            if (!text.trim()) {
                alert("Text layer đang rỗng.");
                return;
            }
            lastPreviewText = text;
            renderPreviews(text);
        });
    }

    // Chuyển đổi dọc / ngang
btnToggle.addEventListener("click", function() {
    isHorizontal = !isHorizontal;
    if (isHorizontal) {
        grid.classList.add("horizontal");
        btnToggle.textContent = "V";   // khi đang ngang -> hiện "V" (vertical)
    } else {
        grid.classList.remove("horizontal");
        btnToggle.textContent = "H";   // khi đang dọc -> hiện "H" (horizontal)
    }
});
    // Mở popup → load ngay và bắt đầu polling
        // Mở popup → load ngay và bắt đầu polling nhẹ (1000ms)
    btnOpen.addEventListener("click", function() {
    overlay.style.display = "block";
    loadPreviews();
    if (previewInterval) clearInterval(previewInterval);
    var vis = loadVis();
    if (!vis.manualLoadText) {   // chỉ bật polling nếu KHÔNG chọn manual
        previewInterval = setInterval(updatePreviewIfNeeded, 1000);
    }
});

    // Đóng popup → hủy polling
        function closePopup() {
        overlay.style.display = "none";
        if (previewInterval) {
            clearInterval(previewInterval);
            previewInterval = null;
        }
    }
    btnClose.addEventListener("click", closePopup);
    overlay.addEventListener("click", function(e) {
        if (e.target === overlay) closePopup();
    });

    btnLoad.addEventListener("click", loadPreviews);
// Tự động mở popup ngay khi panel được tải
    btnOpen.click();
}

  // ========== KHỞI ĐỘNG ==========
  (function init() {
    var vis = loadVis();
    applyVis(vis);

    var savedLogo = localStorage.getItem("typoCoreLogoPath");
    if (savedLogo) {
      cs.evalScript('LOGO_PATH = "' + savedLogo.replace(/"/g, '\\"') + '"');
      var btnLogo = document.getElementById("btnLogo");
      if (btnLogo) btnLogo.title = savedLogo;
      console.log("[Logo] Đã phục hồi:", savedLogo);
    }

    setupSettingPopup();
    setupPreviewPopup();
    console.log("[TypoCore] Ready with all features");
  })();

  function applyCase(n) { _exec('applyCase(' + n + ')'); }
  function splitEven(n) { _exec('splitEven(' + n + ')'); }
</script>
